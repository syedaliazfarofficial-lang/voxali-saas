<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desi Dhaba — Order Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: #fff;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
  padding: 24px 20px 32px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}
.header h1 { font-size: 22px; font-weight: 800; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

.cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1a1a2e;
  border-top: 2px solid #7C3AED;
  padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 200;
  backdrop-filter: blur(20px);
  transition: transform 0.3s;
}
.cart-bar.hidden { transform: translateY(100%); }
.cart-total { font-size: 16px; font-weight: 800; color: #7C3AED; }
.cart-count { font-size: 13px; color: #aaa; }
.btn-checkout {
  background: linear-gradient(135deg, #7C3AED, #EC4899);
  color: #fff; border: none; padding: 12px 28px;
  border-radius: 12px; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.btn-checkout:active { transform: scale(0.95); }
.btn-checkout:disabled { opacity: 0.4; }

.menu-section { padding: 16px 16px 100px; }
.category-title {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: #7C3AED; margin: 20px 0 12px;
  padding-left: 4px;
}

.item-card {
  background: #1a1a2e;
  border: 2px solid transparent;
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}
.item-card.selected { border-color: #7C3AED; background: #1e1636; }

.item-top {
  display: flex; gap: 14px; padding: 14px;
  align-items: center;
}
.item-img {
  width: 72px; height: 72px; border-radius: 12px;
  object-fit: cover; flex-shrink: 0;
  background: #2a2a3e;
}
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 700; }
.item-desc {
  font-size: 12px; color: #888; margin-top: 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.item-price { font-size: 15px; font-weight: 800; color: #7C3AED; margin-top: 4px; }

.item-check {
  width: 24px; height: 24px; border-radius: 6px;
  border: 2px solid #444; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.15s;
}
.item-card.selected .item-check {
  background: #7C3AED; border-color: #7C3AED;
}
.item-check svg { display: none; }
.item-card.selected .item-check svg { display: block; }

.qty-row {
  display: none; padding: 0 14px 14px;
  align-items: center; gap: 12px;
}
.item-card.selected .qty-row { display: flex; }
.qty-label { font-size: 12px; color: #aaa; }
.qty-controls {
  display: flex; align-items: center; gap: 0;
  background: #2a2a3e; border-radius: 10px; overflow: hidden;
}
.qty-btn {
  width: 36px; height: 36px; border: none;
  background: transparent; color: #7C3AED;
  font-size: 18px; font-weight: 700; cursor: pointer;
}
.qty-btn:active { background: rgba(124,58,237,0.2); }
.qty-value {
  width: 36px; text-align: center; font-size: 15px;
  font-weight: 700; color: #fff; background: transparent;
}

/* Checkout Form */
.checkout-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 500;
  overflow-y: auto; padding: 20px;
}
.checkout-overlay.show { display: block; }
.checkout-form {
  background: #1a1a2e; border-radius: 20px;
  padding: 28px 24px; max-width: 480px; margin: 0 auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.form-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: #888; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 12px 16px; background: #0f0f0f;
  border: 2px solid #333; border-radius: 12px; color: #fff;
  font-size: 14px; font-family: inherit; outline: none;
}
.form-input:focus { border-color: #7C3AED; }

.type-options { display: flex; gap: 8px; }
.type-btn {
  flex: 1; padding: 12px; border: 2px solid #333;
  background: transparent; border-radius: 12px;
  color: #aaa; font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.type-btn.active { border-color: #7C3AED; color: #7C3AED; background: rgba(124,58,237,0.1); }

.pay-options { display: flex; gap: 8px; }
.pay-btn {
  flex: 1; padding: 12px 8px; border: 2px solid #333;
  background: transparent; border-radius: 12px;
  color: #aaa; font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.pay-btn.active { border-color: #7C3AED; color: #7C3AED; background: rgba(124,58,237,0.1); }

.order-summary {
  background: #0f0f0f; border-radius: 12px;
  padding: 16px; margin-bottom: 20px;
}
.summary-item {
  display: flex; justify-content: space-between;
  font-size: 13px; padding: 6px 0;
  border-bottom: 1px solid #222;
}
.summary-item:last-child { border: none; }
.summary-total {
  display: flex; justify-content: space-between;
  font-size: 16px; font-weight: 800; color: #7C3AED;
  padding-top: 10px; margin-top: 6px;
  border-top: 2px solid #333;
}

.btn-submit {
  width: 100%; padding: 16px; border: none;
  background: linear-gradient(135deg, #7C3AED, #EC4899);
  color: #fff; font-size: 16px; font-weight: 800;
  border-radius: 14px; cursor: pointer; margin-top: 8px;
}
.btn-back {
  width: 100%; padding: 14px; border: 2px solid #333;
  background: transparent; color: #888; font-size: 14px;
  font-weight: 600; border-radius: 14px; cursor: pointer; margin-top: 8px;
}

.success-screen {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #0f0f0f; z-index: 600; 
  align-items: center; justify-content: center; text-align: center; padding: 40px;
}
.success-screen.show { display: flex; flex-direction: column; }
.success-icon { font-size: 64px; margin-bottom: 20px; }
.success-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.success-sub { font-size: 14px; color: #888; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h1>🍽️ Desi Dhaba</h1>
  <p>Select items → Set quantity → Checkout!</p>
</div>

<div class="menu-section" id="menuSection">
  <p style="text-align:center;color:#888;padding:40px 0;">Loading menu...</p>
</div>

<div class="cart-bar hidden" id="cartBar">
  <div>
    <div class="cart-total" id="cartTotal">Rs. 0</div>
    <div class="cart-count" id="cartCount">0 items selected</div>
  </div>
  <button class="btn-checkout" id="btnCheckout" onclick="openCheckout()">Checkout →</button>
</div>

<!-- Checkout Form -->
<div class="checkout-overlay" id="checkoutOverlay">
  <div class="checkout-form">
    <h2 class="form-title">🛒 Order Details</h2>
    
    <div class="order-summary" id="orderSummary"></div>

    <div class="form-group">
      <label class="form-label">👤 Aapka Naam</label>
      <input type="text" class="form-input" id="custName" placeholder="Poora naam likhein">
    </div>

    <div class="form-group">
      <label class="form-label">📞 Phone Number</label>
      <input type="tel" class="form-input" id="custPhone" placeholder="03XX-XXXXXXX">
    </div>

    <div class="form-group">
      <label class="form-label">🏠 Order Type</label>
      <div class="type-options">
        <button class="type-btn active" onclick="setType(this,'delivery')">🛵 Delivery</button>
        <button class="type-btn" onclick="setType(this,'dinein')">🍽️ Dine-in</button>
        <button class="type-btn" onclick="setType(this,'takeaway')">📦 Takeaway</button>
      </div>
    </div>

    <div class="form-group" id="addressGroup">
      <label class="form-label">📍 Delivery Address</label>
      <input type="text" class="form-input" id="custAddress" placeholder="Poora address likhein">
    </div>

    <div class="form-group">
      <label class="form-label">💳 Payment Method</label>
      <div class="pay-options">
        <button class="pay-btn active" onclick="setPay(this,'cash')">💵 Cash</button>
        <button class="pay-btn" onclick="setPay(this,'easypaisa')">📱 EasyPaisa</button>
        <button class="pay-btn" onclick="setPay(this,'jazzcash')">📱 JazzCash</button>
      </div>
    </div>

    <button class="btn-submit" onclick="submitOrder()">✅ Order Confirm Karein</button>
    <button class="btn-back" onclick="closeCheckout()">← Wapas Menu</button>
  </div>
</div>

<!-- Success -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">Order Confirmed!</div>
  <div class="success-sub" id="successMsg">Shukriya! Aapka order receive ho gaya hai.</div>
</div>

<script>
const SUPABASE_URL = "https://myuqhxicepxnnafxethe.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dXFoeGljZXB4bm5hZnhldGhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDc5NDMsImV4cCI6MjA5MzEyMzk0M30.yPlRtlH9NmMsRaOqPcjYcpMOEsj8PsBHMy4SWSoZNmo";

let menuItems = [];
let selectedItems = {}; // { itemId: { ...item, qty: N } }
let orderType = "delivery";
let payMethod = "cash";

// Get wa_id from URL params
const params = new URLSearchParams(window.location.search);
const waId = params.get("wa") || "";

async function loadMenu() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/menu_items?select=id,name,price,description,image_url,menu_categories(name)&is_available=eq.true`,
    { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
  );
  menuItems = await res.json();
  renderMenu();
}

function renderMenu() {
  const grouped = {};
  menuItems.forEach(item => {
    const cat = item.menu_categories?.name || "Other";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  });

  let html = "";
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="category-title">${cat}</div>`;
    items.forEach(item => {
      const sel = selectedItems[item.id] ? "selected" : "";
      const qty = selectedItems[item.id]?.qty || 1;
      html += `
        <div class="item-card ${sel}" id="card_${item.id}" onclick="toggleItem('${item.id}')">
          <div class="item-top">
            ${item.image_url ? `<img class="item-img" src="${item.image_url}" alt="${item.name}">` : `<div class="item-img"></div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ""}
              <div class="item-price">Rs. ${Number(item.price).toLocaleString()}</div>
            </div>
            <div class="item-check">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
          <div class="qty-row" onclick="event.stopPropagation()">
            <span class="qty-label">Quantity:</span>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <span class="qty-value" id="qty_${item.id}">${qty}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById("menuSection").innerHTML = html;
  updateCartBar();
}

function toggleItem(id) {
  if (selectedItems[id]) {
    delete selectedItems[id];
  } else {
    const item = menuItems.find(i => i.id === id);
    if (item) selectedItems[id] = { ...item, qty: 1 };
  }
  renderMenu();
}

function changeQty(id, delta) {
  if (!selectedItems[id]) return;
  const newQty = Math.max(1, Math.min(99, selectedItems[id].qty + delta));
  selectedItems[id].qty = newQty;
  document.getElementById(`qty_${id}`).textContent = newQty;
  updateCartBar();
}

function updateCartBar() {
  const items = Object.values(selectedItems);
  const total = items.reduce((sum, i) => sum + (i.price * i.qty), 0);
  const count = items.length;
  
  document.getElementById("cartTotal").textContent = `Rs. ${total.toLocaleString()}`;
  document.getElementById("cartCount").textContent = `${count} item${count !== 1 ? "s" : ""} selected`;
  document.getElementById("cartBar").classList.toggle("hidden", count === 0);
}

function openCheckout() {
  const items = Object.values(selectedItems);
  if (!items.length) return;

  let html = "";
  let total = 0;
  items.forEach(i => {
    const sub = i.price * i.qty;
    total += sub;
    html += `<div class="summary-item"><span>${i.name} × ${i.qty}</span><span>Rs. ${sub.toLocaleString()}</span></div>`;
  });
  html += `<div class="summary-total"><span>Total</span><span>Rs. ${total.toLocaleString()}</span></div>`;
  document.getElementById("orderSummary").innerHTML = html;
  document.getElementById("checkoutOverlay").classList.add("show");
}

function closeCheckout() {
  document.getElementById("checkoutOverlay").classList.remove("show");
}

function setType(btn, type) {
  orderType = type;
  btn.parentElement.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("addressGroup").style.display = type === "delivery" ? "block" : "none";
}

function setPay(btn, method) {
  payMethod = method;
  btn.parentElement.querySelectorAll(".pay-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

async function submitOrder() {
  const name = document.getElementById("custName").value.trim();
  const phone = document.getElementById("custPhone").value.trim();
  const address = document.getElementById("custAddress").value.trim();

  if (!name) { alert("Apna naam likhein!"); return; }
  if (!phone) { alert("Phone number dein!"); return; }
  if (orderType === "delivery" && !address) { alert("Delivery address dein!"); return; }

  const items = Object.values(selectedItems);
  const total = items.reduce((sum, i) => sum + (i.price * i.qty), 0);
  const itemsSummary = items.map(i => `${i.name} x${i.qty}`).join(", ");
  const orderItems = items.map(i => ({
    item_id: i.id, name: i.name, quantity: i.qty,
    unit_price: i.price, subtotal: i.price * i.qty
  }));

  const orderData = {
    customer_name: name,
    wa_id: waId || phone,
    items_summary: itemsSummary,
    order_items: orderItems,
    total_price: total,
    delivery_address: orderType === "delivery" ? address : orderType === "dinein" ? "Dine-in" : "Takeaway",
    order_status: "pending",
  };

  try {
    await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify(orderData),
    });

    document.getElementById("checkoutOverlay").classList.remove("show");
    document.getElementById("successMsg").innerHTML = 
      `👤 ${name}<br>📞 ${phone}<br>💰 Rs. ${total.toLocaleString()}<br><br>⏳ ${orderType === "delivery" ? "30-45 min delivery" : "15-20 min ready"}`;
    document.getElementById("successScreen").classList.add("show");
  } catch (e) {
    alert("Error! Please try again.");
  }
}

loadMenu();
</script>
</body>
</html>
